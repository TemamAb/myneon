
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AION V IX - Sovereign Wealth Forge</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --obsidian: #020204;
      --cobalt: #00A3FF;
      --emerald: #10b981;
      --gold: #D4AF37;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--obsidian);
      color: #e2e8f0;
      overflow-x: hidden;
      margin: 0;
    }
    .font-mono { font-family: 'Fira Code', monospace; }
    
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 50% 50%, rgba(0, 163, 255, 0.02), transparent 70%),
        linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.6));
      z-index: -2;
    }

    /* Reactive Scanline Overlay */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 1000;
      opacity: 0.15;
    }

    .data-stream {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.3;
      overflow: hidden;
    }

    .tracer {
      position: absolute;
      width: 1px;
      height: 150px;
      background: linear-gradient(to bottom, transparent, var(--cobalt), transparent);
      animation: fall linear infinite;
    }

    @keyframes fall {
      from { transform: translateY(-300px); }
      to { transform: translateY(120vh); }
    }

    .glass {
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(40px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9), inset 0 1px 1px rgba(255,255,255,0.01);
    }

    .glass-heavy {
      background: rgba(4, 4, 6, 0.95);
      backdrop-filter: blur(50px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    @keyframes flux-glow {
      0%, 100% { filter: brightness(1) drop-shadow(0 0 5px rgba(0, 163, 255, 0.2)); }
      50% { filter: brightness(1.3) drop-shadow(0 0 20px rgba(0, 163, 255, 0.5)); }
    }

    .animate-flux {
      animation: flux-glow 3s ease-in-out infinite;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 163, 255, 0.2);
      border-radius: 10px;
    }

    .wealth-pulse {
      animation: wealth-glow 6s ease-in-out infinite;
    }
    @keyframes wealth-glow {
      0%, 100% { text-shadow: 0 0 30px rgba(212, 175, 55, 0); }
      50% { text-shadow: 0 0 40px rgba(212, 175, 55, 0.4); }
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 163, 255, 0.2);
    }
  </style>
<link rel="stylesheet" href="/index.css">
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
<body>
  <div class="data-stream" id="stream-layer"></div>
  <div id="root"></div>
  <script>
    const layer = document.getElementById('stream-layer');
    for(let i=0; i<60; i++) {
      const t = document.createElement('div');
      t.className = 'tracer';
      t.style.left = Math.random() * 100 + '%';
      t.style.animationDuration = (1.5 + Math.random() * 4) + 's';
      t.style.animationDelay = (Math.random() * 8) + 's';
      t.style.opacity = Math.random() * 0.4;
      layer.appendChild(t);
    }
  </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
